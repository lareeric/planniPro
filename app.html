<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanniPro — Mon emploi du temps</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23ff6b35'/><text x='4' y='24' font-size='22' fill='white'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/app-override.css">
</head>
<body>

<!-- ══════════════════════════════════
     ÉCRAN AUTH
═══════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Planni<span>Pro</span></div>
    <p class="auth-subtitle">Votre emploi du temps, organisé avec précision.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="connexion">Connexion</button>
      <button class="auth-tab" data-tab="inscription">Créer un compte</button>
    </div>
    <form id="form-connexion">
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" name="email" type="email" placeholder="votre@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input class="form-control" name="mdp" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn-primary" type="submit">Se connecter</button>
      <div class="auth-error" id="auth-error-connexion"></div>
    </form>
    <form id="form-inscription" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input class="form-control" name="prenom" type="text" placeholder="Jean" required>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input class="form-control" name="nom" type="text" placeholder="Dupont" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" name="email" type="email" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label>Mot de passe <small style="color:var(--ink-faint)">(min. 6 car.)</small></label>
        <input class="form-control" name="mdp" type="password" placeholder="••••••••" required>
      </div>
      <button class="btn-primary" type="submit">Créer mon compte</button>
      <div class="auth-error" id="auth-error-inscription"></div>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:.8rem;color:var(--ink-faint)">
      <a href="landing.html" style="color:var(--accent)">← Retour à l'accueil</a>
    </p>
  </div>
</div>

<!-- ══════════════════════════════════
     APPLICATION
═══════════════════════════════════ -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">Planni<span>Pro</span></div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Affichage</div>
      <button class="sidebar-btn active" data-vue="semaine">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Vue semaine
      </button>
      <button class="sidebar-btn" data-vue="mois">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M7 14h.01M12 14h.01M17 14h.01M7 18h.01M12 18h.01M17 18h.01"/></svg>
        Vue mois
      </button>
      <button class="sidebar-btn" data-vue="annee">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M7 15l2 2 4-4" stroke-linecap="round"/></svg>
        Vue année
      </button>
    </div>

    <div class="sidebar-section">
      <div class="mini-calendar">
        <div class="mini-cal-header">
          <button class="mini-cal-nav" id="mini-prev">‹</button>
          <span id="mini-cal-label"></span>
          <button class="mini-cal-nav" id="mini-next">›</button>
        </div>
        <div class="mini-cal-grid">
          <div class="mini-cal-day-name">L</div><div class="mini-cal-day-name">M</div>
          <div class="mini-cal-day-name">M</div><div class="mini-cal-day-name">J</div>
          <div class="mini-cal-day-name">V</div><div class="mini-cal-day-name">S</div>
          <div class="mini-cal-day-name">D</div>
          <div id="mini-cal-days" style="display:contents"></div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Actions rapides</div>
      <button class="sidebar-btn" onclick="document.getElementById('btn-new').click()">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8" stroke-linecap="round"/></svg>
        Nouvel événement
      </button>
      <button class="sidebar-btn" id="btn-mes-ev-sidebar">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round"/></svg>
        Mes événements
      </button>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-name" id="user-name">Chargement…</div>
      <button class="btn-logout" id="btn-logout" title="Déconnexion">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7M13 4h-2a2 2 0 00-2 2v12a2 2 0 002 2h2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <button id="btn-menu" style="display:none;padding:6px;border-radius:6px;border:1.5px solid var(--border);color:var(--ink-light)">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
      </button>
      <div class="topbar-nav">
        <button id="btn-prev" title="Précédent">‹</button>
        <button id="btn-today" style="font-size:.75rem;font-weight:600;padding:0 10px;width:auto;">Auj.</button>
        <button id="btn-next" title="Suivant">›</button>
      </div>
      <div class="topbar-title" id="topbar-title">Chargement…</div>
      <div class="view-switcher">
        <button class="view-btn active" data-vue="semaine">Semaine</button>
        <button class="view-btn" data-vue="mois">Mois</button>
        <button class="view-btn" data-vue="annee">Année</button>
      </div>
      <button class="btn-new" id="btn-new" title="Nouvel événement (Ctrl+N)">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        Nouveau
      </button>
    </header>

    <div class="calendar-wrap">
      <div id="calendar-zone">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<!-- ══════════════════════════════════
     PANNEAU DÉTAIL ÉVÉNEMENT
═══════════════════════════════════ -->
<div id="event-detail-panel" class="ev-panel" style="display:none">
  <div class="ev-panel-overlay" id="ev-panel-overlay"></div>
  <div class="ev-panel-drawer">
    <div class="ev-panel-header">
      <div class="ev-panel-color-bar" id="ev-panel-colorbar"></div>
      <div class="ev-panel-header-content">
        <h2 class="ev-panel-title" id="ev-panel-title">Titre</h2>
        <div class="ev-panel-category" id="ev-panel-cat"></div>
      </div>
      <button class="ev-panel-close" id="ev-panel-close">✕</button>
    </div>

    <div class="ev-panel-body">
      <!-- Infos principales -->
      <div class="ev-info-grid" id="ev-info-grid"></div>

      <!-- Description -->
      <div class="ev-desc-block" id="ev-desc-block" style="display:none">
        <div class="ev-info-label">📝 Description</div>
        <div class="ev-desc-text" id="ev-panel-desc"></div>
      </div>

      <!-- Actions rapides -->
      <div class="ev-actions-grid">
        <button class="ev-action-btn ev-action-edit" id="ev-btn-edit">
          <span class="ev-action-icon">✏️</span>
          <span class="ev-action-label">Modifier</span>
          <span class="ev-action-sub">Éditer tous les détails</span>
        </button>
        <button class="ev-action-btn ev-action-duplicate" id="ev-btn-duplicate">
          <span class="ev-action-icon">📋</span>
          <span class="ev-action-label">Dupliquer</span>
          <span class="ev-action-sub">Créer une copie</span>
        </button>
        <button class="ev-action-btn ev-action-color" id="ev-btn-color">
          <span class="ev-action-icon">🎨</span>
          <span class="ev-action-label">Couleur</span>
          <span class="ev-action-sub">Changer la teinte</span>
        </button>
        <button class="ev-action-btn ev-action-done" id="ev-btn-done">
          <span class="ev-action-icon" id="ev-done-icon">⬜</span>
          <span class="ev-action-label" id="ev-done-label">Marquer fait</span>
          <span class="ev-action-sub" id="ev-done-sub">Cocher comme terminé</span>
        </button>
        <button class="ev-action-btn ev-action-share" id="ev-btn-share">
          <span class="ev-action-icon">📤</span>
          <span class="ev-action-label">Exporter</span>
          <span class="ev-action-sub">Copier les infos</span>
        </button>
      </div>

      <!-- Changer couleur rapide -->
      <div class="ev-quick-colors" id="ev-quick-colors" style="display:none">
        <div class="ev-info-label">Choisir une couleur</div>
        <div class="ev-colors-row" id="ev-colors-row"></div>
      </div>

      <!-- Zone danger -->
      <div class="ev-danger-zone">
        <div class="ev-danger-title">Zone dangereuse</div>
        <button class="ev-btn-delete" id="ev-btn-delete">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round"/></svg>
          Supprimer définitivement cet événement
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toasts -->
<div id="toast-container"></div>

<!-- Panel liste événements -->
<div id="ev-list-panel" style="display:none;position:fixed;inset:0;z-index:400;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)" id="ev-list-overlay"></div>
  <div style="position:absolute;right:0;top:0;bottom:0;width:420px;background:var(--white);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideLeft .25s ease">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <h3 style="font-family:var(--font-serif);font-size:1.2rem">Tous mes événements</h3>
      <button id="ev-list-close" style="width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-light)">✕</button>
    </div>
    <div style="padding:16px;border-bottom:1px solid var(--border)">
      <input id="ev-list-search" class="form-control" type="text" placeholder="🔍 Rechercher un événement…" style="background:var(--paper)">
    </div>
    <div id="ev-list-content" style="flex:1;overflow-y:auto;padding:12px"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/panel.js"></script>
<script>
  if (window.innerWidth <= 768) document.getElementById('btn-menu').style.display = 'inline-flex';
</script>
<script src="js/stripe_frontend.js"></script>
</body>
</html>
